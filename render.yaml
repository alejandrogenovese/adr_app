services:
  - type: web
    name: adr-manager
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: adr-data
      mountPath: /opt/render/project/data
      sizeGB: 1
